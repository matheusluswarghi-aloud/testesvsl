  <style>
    /* ── RESET & TOKENS ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold-start: #c9922a;
      --gold-mid:   #e8b84b;
      --gold-end:   #f0c870;

      --bg-2:       #0d0d0d;

      --grad-gold: linear-gradient(90deg, var(--gold-start), var(--gold-end));
      --grad-gold-v: linear-gradient(180deg, var(--gold-start), var(--gold-end));
    }

    html, body {

      color: var(--text);
      font-family: 'Montserrat', sans-serif;

      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;

    /* ── URGENCY BAR ────────────────────────────────────────────── */
    .urgency-bar {
      background: #000;
      border-bottom: 1px solid #161616;
      padding: 13px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 200;

      /* subtle shimmer line */
      box-shadow: 0 1px 0 0 rgba(201,146,42,.18);
    }

    .urgency-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0%,
        rgba(201,146,42,.03) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmerBar 4s linear infinite;
      pointer-events: none;
    }

    @keyframes shimmerBar {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .urgency-bar p {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.45rem, 5.2vw, 1.85rem);
      letter-spacing: .13em;
      color: #e8e8e8;
      position: relative;
    }

    .urgency-bar p .emo { margin-right: .2em; }

    .urgency-bar p .highlight {
      background: var(--grad-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── MAIN ───────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 72px;
      position: relative;
    }

    /* radial glow behind the player */
    main::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 680px; height: 680px;
      background: radial-gradient(circle, rgba(201,146,42,.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── VIDEO WRAPPER ──────────────────────────────────────────── */
    .video-wrapper {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      animation: fadeUp .85s .15s cubic-bezier(.22,.8,.4,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* vturb custom element */
    vturb-smartplayer {
      display: block;
      width: 100%;
    }

    /* ── FOOTER ─────────────────────────────────────────────────── */
    footer {
      background: #000;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;

    .footer-right {

    .footer-links {

  <!-- ② UTM TRACKER — captura, persiste e repassa parâmetros UTM -->
  <script>
    (function(){
      var UTM_KEYS = ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','utm_id','fbclid','gclid'];
      var STORE_KEY = 'ist_utms';          // prefixo da marca (Inglês sem Trava)
      var SESSION_KEY = 'ist_utms_session';

      /* — Captura UTMs da URL atual — */
      function parseUTMs(){
        var params = new URLSearchParams(window.location.search);
        var obj = {};
        UTM_KEYS.forEach(function(k){ if(params.has(k)) obj[k] = params.get(k); });
        return obj;
      }

      /* — Armazena/merge no localStorage e sessionStorage — */
      function storeUTMs(utms){
        if(!Object.keys(utms).length) return;
        try {
          var prev = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
          var merged = Object.assign(prev, utms);
          localStorage.setItem(STORE_KEY, JSON.stringify(merged));
          sessionStorage.setItem(SESSION_KEY, JSON.stringify(utms));
        } catch(e){}
      }

      /* — Anexa UTMs salvos em todos os links de saída (CTAs) — */
      function appendUTMsToLinks(){
        try {
          var saved = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
          if(!Object.keys(saved).length) return;
          document.querySelectorAll('a[href]').forEach(function(a){
            try {
              var url = new URL(a.href, location.href);
              // Só anexa em domínios externos ou de checkout
              if(url.hostname === location.hostname) return;
              Object.keys(saved).forEach(function(k){ url.searchParams.set(k, saved[k]); });
              a.href = url.toString();
            } catch(e){}
          });
        } catch(e){}
      }

      /* — Expõe helper global para uso em outros scripts — */
      window.getStoredUTMs = function(){
        try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e){ return {}; }
      };

      /* — Execução — */
      var current = parseUTMs();
      storeUTMs(current);

      /* Aguarda DOM pronto para injetar nos links */
      if(document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', appendUTMsToLinks);
      } else {
        appendUTMsToLinks();
      }
    })();
  </script>
